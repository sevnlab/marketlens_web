<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg" style="background:#0a0f1e; border-radius:16px;">
  <defs>
    <radialGradient id="lensGrad" cx="40%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#4fc3f7" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#1565c0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0d47a1" stop-opacity="0.3"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background grid -->
  <g opacity="0.05">
    <line x1="0" y1="60" x2="600" y2="60" stroke="#4fc3f7" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="600" y2="120" stroke="#4fc3f7" stroke-width="0.5"/>
    <line x1="0" y1="180" x2="600" y2="180" stroke="#4fc3f7" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="600" y2="240" stroke="#4fc3f7" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="300" stroke="#4fc3f7" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="300" stroke="#4fc3f7" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="300" stroke="#4fc3f7" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="300" stroke="#4fc3f7" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="300" stroke="#4fc3f7" stroke-width="0.5"/>
  </g>

  <!-- Outer lens ring -->
  <circle cx="120" cy="148" r="62" fill="none" stroke="url(#ringGrad)" stroke-width="4" filter="url(#glow)"/>
  <!-- Lens fill -->
  <circle cx="120" cy="148" r="57" fill="url(#lensGrad)" opacity="0.3"/>
  <!-- Crosshair -->
  <line x1="120" y1="96" x2="120" y2="200" stroke="#4fc3f7" stroke-width="0.8" opacity="0.4"/>
  <line x1="68" y1="148" x2="172" y2="148" stroke="#4fc3f7" stroke-width="0.8" opacity="0.4"/>
  <!-- Inner reticle -->
  <circle cx="120" cy="148" r="22" fill="none" stroke="#4fc3f7" stroke-width="1" opacity="0.5"/>

  <!-- Market bars -->
  <rect x="92" y="158" width="10" height="18" rx="2" fill="#4fc3f7" opacity="0.85" filter="url(#softGlow)"/>
  <rect x="107" y="143" width="10" height="33" rx="2" fill="#29b6f6" opacity="0.9" filter="url(#softGlow)"/>
  <rect x="122" y="150" width="10" height="26" rx="2" fill="#4fc3f7" opacity="0.85" filter="url(#softGlow)"/>
  <rect x="137" y="136" width="10" height="40" rx="2" fill="#1e88e5" opacity="0.95" filter="url(#softGlow)"/>

  <!-- Trend line -->
  <polyline points="97,155 112,138 127,145 142,128" fill="none" stroke="#80deea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)"/>
  <circle cx="97" cy="155" r="2.5" fill="#80deea"/>
  <circle cx="112" cy="138" r="2.5" fill="#80deea"/>
  <circle cx="127" cy="145" r="2.5" fill="#80deea"/>
  <circle cx="142" cy="128" r="2.5" fill="#80deea"/>

  <!-- Handle -->
  <line x1="168" y1="195" x2="195" y2="222" stroke="url(#ringGrad)" stroke-width="7" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Wordmark -->
  <text x="218" y="138" font-family="'Helvetica Neue', 'Arial', sans-serif" font-weight="300" font-size="46" letter-spacing="2" fill="#e3f2fd" opacity="0.92">market</text>
  <text x="218" y="185" font-family="'Helvetica Neue', 'Arial', sans-serif" font-weight="700" font-size="46" letter-spacing="2" fill="url(#ringGrad)" filter="url(#softGlow)">lens</text>

  <!-- Divider line -->
  <rect x="218" y="148" width="310" height="2" rx="1" fill="url(#ringGrad)" opacity="0.4"/>

  <!-- Tagline -->
  <text x="219" y="215" font-family="'Helvetica Neue', 'Arial', sans-serif" font-weight="400" font-size="12" letter-spacing="4" fill="#4fc3f7" opacity="0.6">SECONDHAND MARKET AGGREGATOR</text>
</svg>
